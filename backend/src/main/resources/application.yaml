server:
  port: 8080

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

app:
  batch:
    flush-interval-seconds: 30
    buffer-size-threshold: 10
  redis:
    nodes:
      - localhost:6379
      - localhost:6380
      - localhost:6381
  virtual-time:
    reference-date: "2006-05-31T23:59:56"
